version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: nexushr_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: nexushr
      POSTGRES_PASSWORD: nexushr_secret
      POSTGRES_DB: nexushr
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: nexushr_redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  postgres_data:
